<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Hawaii Obstacle Course</title>
  <style>
    body { margin: 0; background: #1a5f7a; display: flex; justify-content: center; align-items: center; min-height: 100vh; position: relative; overflow: hidden; }
    canvas { border: 2px solid #0d3d4d; border-radius: 8px; background: #87ceeb; display: block; }

    /* Mobile joystick controls */
    #joystickContainer {
      position: absolute;
      left: 16px;
      bottom: 20px;
      width: 260px;
      height: 260px;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      pointer-events: auto;
    }
    #joystickBase {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.35), rgba(0,0,0,0.45));
      box-shadow: 0 0 8px rgba(0,0,0,0.5);
      opacity: 0.85;
      position: relative;
    }
    #joystickKnob {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 88px;
      height: 88px;
      margin-left: -44px;
      margin-top: -44px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #ffffff, #e3e3e3);
      box-shadow: 0 3px 8px rgba(0,0,0,0.5);
      transition: transform 0.08s ease-out;
    }

    /* Portrait-mode layout tweaks for phones */
    @media (orientation: portrait) {
      body {
        flex-direction: column;
        justify-content: flex-start;
        align-items: center;
        overflow-y: auto;
      }

      canvas {
        width: 100vw;
        height: auto;
        max-height: 75vh;
      }

      #joystickContainer {
        left: 50%;
        bottom: 200px;
        transform: translateX(-50%);
      }
    }
  </style>
</head>
<body>
  <canvas id="game" width="480" height="800"></canvas>
  <div id="joystickContainer">
    <div id="joystickBase">
      <div id="joystickKnob"></div>
    </div>
  </div>
  <audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
    <source src="music.ogg" type="audio/ogg">
  </audio>
  <audio id="blastAudioFallback"></audio>
  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const W = canvas.width;
    const H = canvas.height;

    // Joystick elements (for touch / phone)
    const joystickContainer = document.getElementById('joystickContainer');
    const joystickBase = document.getElementById('joystickBase');
    const joystickKnob = document.getElementById('joystickKnob');

    const bgMusic = document.getElementById('bgMusic');
    const blastAudioFallback = document.getElementById('blastAudioFallback');
    const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

    function makeBlastWavDataUri() {
      var sampleRate = 22050;
      var dur = 0.14;
      var numSamples = Math.floor(sampleRate * dur);
      var dataSize = numSamples * 2;
      var buffer = new ArrayBuffer(44 + dataSize);
      var view = new DataView(buffer);
      function str(off, s) { for (var i = 0; i < s.length; i++) view.setUint8(off + i, s.charCodeAt(i)); }
      str(0, 'RIFF');
      view.setUint32(4, 36 + dataSize, true);
      str(8, 'WAVE');
      str(12, 'fmt ');
      view.setUint32(16, 16, true);
      view.setUint16(20, 1, true);
      view.setUint16(22, 1, true);
      view.setUint32(24, sampleRate, true);
      view.setUint32(28, sampleRate * 2, true);
      view.setUint16(32, 16, true);
      view.setUint16(34, 16, true);
      str(36, 'data');
      view.setUint32(40, dataSize, true);
      var samples = new Int16Array(buffer, 44, numSamples);
      for (var i = 0; i < numSamples; i++) {
        var t = i / sampleRate;
        var noise = (Math.random() * 2 - 1) * Math.exp(-t / 0.03);
        var tone = Math.sin(2 * Math.PI * 480 * t) * Math.exp(-t / 0.06);
        var amp = (i < 8) ? 1 : Math.exp(-t / 0.04);
        samples[i] = Math.max(-32767, Math.min(32767, Math.floor((noise * 0.65 + tone * 0.5) * 22000 * amp)));
      }
      var bytes = new Uint8Array(buffer);
      var binary = '';
      for (var j = 0; j < bytes.length; j++) binary += String.fromCharCode(bytes[j]);
      return 'data:audio/wav;base64,' + btoa(binary);
    }

    var blastPool = [];
    if (isTouchDevice) {
      var blastWav = makeBlastWavDataUri();
      for (var p = 0; p < 4; p++) {
        var a = new Audio(blastWav);
        a.volume = 1;
        a.preload = 'auto';
        blastPool.push(a);
      }
      blastAudioFallback.volume = 1;
      blastAudioFallback.preload = 'auto';
    }

    let musicStarted = false;
    function tryStartMusic() {
      if (musicStarted) return;
      musicStarted = true;
      bgMusic.volume = 0.5;
      bgMusic.play().catch(function () {});
      if (isTouchDevice && blastPool.length) {
        blastPool[0].volume = 0;
        blastPool[0].currentTime = 0;
        blastPool[0].play().catch(function () {});
      }
      if (!blastAudioContext) blastAudioContext = new (window.AudioContext || window.webkitAudioContext)();
      var ctx = blastAudioContext;
      function primeBlastContext() {
        try {
          var buf = ctx.createBuffer(1, 1, ctx.sampleRate);
          buf.getChannelData(0)[0] = 0;
          var src = ctx.createBufferSource();
          src.buffer = buf;
          src.connect(ctx.destination);
          src.start(0);
        } catch (e) {}
      }
      if (ctx.state === 'suspended') {
        ctx.resume().then(primeBlastContext).catch(function () {});
      } else {
        primeBlastContext();
      }
    }

    let blastAudioContext = null;
    var blastPoolIndex = 0;
    function playBlastSound() {
      if (isTouchDevice && blastPool.length) {
        try {
          var a = blastPool[blastPoolIndex];
          blastPoolIndex = (blastPoolIndex + 1) % blastPool.length;
          a.volume = 1;
          a.currentTime = 0;
          a.play().catch(function () {});
        } catch (e) {}
        return;
      }
      try {
        if (!blastAudioContext) blastAudioContext = new (window.AudioContext || window.webkitAudioContext)();
        const ctx = blastAudioContext;
        function doPlayBlast() {
          const t0 = ctx.currentTime;
          const dur = 0.18;
          const osc = ctx.createOscillator();
          const oscGain = ctx.createGain();
          osc.connect(oscGain);
          oscGain.connect(ctx.destination);
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(520, t0);
          osc.frequency.exponentialRampToValueAtTime(180, t0 + 0.1);
          oscGain.gain.setValueAtTime(0.65, t0);
          oscGain.gain.exponentialRampToValueAtTime(0.01, t0 + dur);
          osc.start(t0);
          osc.stop(t0 + dur);
          const bufSize = ctx.sampleRate * dur;
          const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
          const channel = buf.getChannelData(0);
          for (let i = 0; i < bufSize; i++) channel[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.04));
          const noise = ctx.createBufferSource();
          noise.buffer = buf;
          const noiseGain = ctx.createGain();
          noise.connect(noiseGain);
          noiseGain.connect(ctx.destination);
          noiseGain.gain.setValueAtTime(0.4, t0);
          noiseGain.gain.exponentialRampToValueAtTime(0.01, t0 + dur);
          noise.start(t0);
          noise.stop(t0 + dur);
        }
        if (ctx.state === 'suspended') {
          ctx.resume().then(doPlayBlast).catch(function () {});
        } else {
          doPlayBlast();
        }
      } catch (e) {}
    }

    // Ground level (sand)
    const groundY = H - 55;
    const oceanHeight = 50;

    // Runner (vertical limit: top of character stays within frame)
    const ceilingMargin = 28; // min distance from top of canvas to runner center
    const runner = {
      x: 80,
      y: groundY - 45,
      vy: 0,
      jumpPower: -14,
      gravity: 0.6,
      onGround: true,
      width: 24,
      height: 45,
      legPhase: 0,
      ducking: false,
      runSpeed: 5
    };

    // Arrow key state (so you can hold keys to move)
    const keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };

    document.addEventListener('keydown', (e) => {
      tryStartMusic();
      const targetTag = (e.target && e.target.tagName) ? e.target.tagName.toLowerCase() : '';
      if (targetTag === 'input' || targetTag === 'textarea') {
        return;
      }

      if (e.key === ' ' && gameOver) {
        e.preventDefault();
        resetGame();
        return;
      }
      if (keys.hasOwnProperty(e.key)) {
        e.preventDefault();
        keys[e.key] = true;
      }
    });
    document.addEventListener('keyup', (e) => {
      const targetTag = (e.target && e.target.tagName) ? e.target.tagName.toLowerCase() : '';
      if (targetTag === 'input' || targetTag === 'textarea') {
        return;
      }
      if (keys.hasOwnProperty(e.key)) {
        e.preventDefault();
        keys[e.key] = false;
      }
    });

    // Obstacles: { x, type, width, height, passed, counted }
    const obstacleTypes = [
      { type: 'rock', w: 28, h: 44, yOffset: 0 },
      { type: 'coconut', w: 20, h: 40, yOffset: -5 },
      { type: 'water', w: 45, h: 50, yOffset: 0 },
      { type: 'tiki', w: 18, h: 80, yOffset: 0 },
      { type: 'flower', w: 35, h: 50, yOffset: 0 },
      { type: 'chips', w: 26, h: 60, yOffset: -4 }
    ];

    let obstacles = [];
    let scrollX = 0;
    let time = 0;
    let nextObstacleAt = 220;
    let nextMeteorAt = 350;
    const scrollSpeed = 3.2;
    let gameOver = false;
    let score = 0;
    let highScore = 0;
    let meteors = [];
    let blasts = [];
    let jets = [];
    let nextJetAt = 380;
    const jetSpeed = scrollSpeed + 4;

    const lethalObstacles = ['rock', 'coconut', 'water', 'tiki', 'chips'];

    // Load saved high score if present
    try {
      const saved = localStorage.getItem('hawaiiRunnerHighScore');
      if (saved) {
        const parsedScore = Number(saved);
        if (!isNaN(parsedScore) && parsedScore > 0) {
          highScore = parsedScore;
        }
      }
    } catch (e) {
      // ignore storage errors
    }

    // --- Touch joystick handling (maps to Arrow keys) ---
    let joystickActive = false;

    function resetJoystickKnob() {
      joystickKnob.style.transform = 'translate(0px, 0px)';
    }

    function updateJoystickFromTouch(touch) {
      if (!touch) return;
      const rect = joystickBase.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      const dx = touch.clientX - cx;
      const dy = touch.clientY - cy;

      // deadzone & max distance
      const maxDist = rect.width * 0.4;
      const dead = rect.width * 0.12;

      // set knob visual position
      const dist = Math.min(maxDist, Math.hypot(dx, dy));
      let knobX = 0;
      let knobY = 0;
      if (dist > 0) {
        const angle = Math.atan2(dy, dx);
        knobX = Math.cos(angle) * dist;
        knobY = Math.sin(angle) * dist;
      }
      joystickKnob.style.transform = `translate(${knobX}px, ${knobY}px)`;

      // clear all directions first
      keys.ArrowLeft = false;
      keys.ArrowRight = false;
      keys.ArrowUp = false;
      keys.ArrowDown = false;

      if (dist < dead) {
        return;
      }

      // 360° directional support: horizontal more sensitive, vertical (jump) less sensitive
      if (Math.abs(dx) > dead * 0.6) {
        if (dx < 0) {
          keys.ArrowLeft = true;
        } else {
          keys.ArrowRight = true;
        }
      }
      if (Math.abs(dy) > dead * 1.4) {
        if (dy < 0) {
          keys.ArrowUp = true;
        } else {
          keys.ArrowDown = true;
        }
      }
    }

    function handleJoystickStart(e) {
      tryStartMusic();
      joystickActive = true;
      const touch = e.touches ? e.touches[0] : e;
      updateJoystickFromTouch(touch);
      if (e.cancelable) e.preventDefault();
    }

    function handleJoystickMove(e) {
      if (!joystickActive) return;
      const touch = e.touches ? e.touches[0] : e;
      updateJoystickFromTouch(touch);
      if (e.cancelable) e.preventDefault();
    }

    function handleJoystickEnd(e) {
      joystickActive = false;
      keys.ArrowLeft = false;
      keys.ArrowRight = false;
      keys.ArrowUp = false;
      keys.ArrowDown = false;
      resetJoystickKnob();
      if (e && e.cancelable) e.preventDefault();
    }

    // Touch events for phones / tablets
    joystickBase.addEventListener('touchstart', handleJoystickStart, { passive: false });
    joystickBase.addEventListener('touchmove', handleJoystickMove, { passive: false });
    joystickBase.addEventListener('touchend', handleJoystickEnd, { passive: false });
    joystickBase.addEventListener('touchcancel', handleJoystickEnd, { passive: false });

    function spawnObstacle() {
      const t = obstacleTypes[Math.floor(Math.random() * obstacleTypes.length)];
      obstacles.push({
        x: W + 20 + scrollX,
        type: t.type,
        w: t.w,
        h: t.h,
        yOffset: t.yOffset,
        passed: false,
        counted: false
      });
    }

    function spawnMeteor() {
      const topHalfMax = Math.floor(H / 2) - 60;
      meteors.push({
        x: scrollX + W + 80,
        y: 40 + Math.random() * topHalfMax,
        r: 12,
        tailLen: 42,
        speed: scrollSpeed + 2 + Math.random() * 14
      });
    }

    function hitTestRunnerMeteor(m) {
      const sx = m.x - scrollX;
      const rH = runner.ducking ? 24 : 35;
      const rHalfW = runner.width / 2;
      const rLeft = runner.x - rHalfW;
      const rRight = runner.x + rHalfW;
      const rTop = runner.y - rH / 2;
      const rBottom = runner.y + rH / 2;
      const cx = sx;
      const cy = m.y;
      const closestX = Math.max(rLeft, Math.min(cx, rRight));
      const closestY = Math.max(rTop, Math.min(cy, rBottom));
      const distSq = (cx - closestX) ** 2 + (cy - closestY) ** 2;
      return distSq <= m.r * m.r;
    }

    function drawMeteor(m) {
      const sx = m.x - scrollX;
      if (sx + m.tailLen + m.r < -20 || sx - m.r > W + 20) return;
      const tailSegments = 8;
      for (let i = tailSegments; i >= 0; i--) {
        const t = i / tailSegments;
        const x = sx + t * m.tailLen;
        const rad = m.r * (0.3 + 0.7 * (1 - t));
        const g = ctx.createRadialGradient(x, m.y, 0, x, m.y, rad);
        g.addColorStop(0, i === 0 ? '#fff' : `rgba(255,${120 + 135 * (1 - t)},0,0.95)`);
        g.addColorStop(0.5, `rgba(255,${80 + 100 * (1 - t)},0,0.6)`);
        g.addColorStop(1, 'rgba(200,40,0,0)');
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(x, m.y, rad, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(sx, m.y, m.r * 0.5, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawBlast(b) {
      const sx = b.x - scrollX;
      if (sx < -100 || sx > W + 100) return;
      const isBig = b.big;
      const dur = isBig ? 0.7 : 0.5;
      const age = time - b.t0;
      if (age >= dur) return;
      const t = age / dur;
      const radius = isBig ? 25 + 80 * t : 15 + 45 * t;
      const alpha = 1 - t;
      const g = ctx.createRadialGradient(sx, b.y, 0, sx, b.y, radius);
      g.addColorStop(0, `rgba(255,255,200,${0.9 * alpha})`);
      g.addColorStop(0.3, `rgba(255,180,0,${0.7 * alpha})`);
      g.addColorStop(0.7, `rgba(255,80,0,${0.4 * alpha})`);
      g.addColorStop(1, 'rgba(200,20,0,0)');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(sx, b.y, radius, 0, Math.PI * 2);
      ctx.fill();
    }

    function spawnJet() {
      const topHalfMax = Math.floor(H / 2) - 50;
      const y0 = 45 + Math.random() * topHalfMax;
      jets.push({
        x: scrollX + W + 70,
        y: y0,
        y0: y0,
        phase: Math.random() * Math.PI * 2,
        w: 76,
        h: 28
      });
    }

    function hitTestRunnerJet(j) {
      const jLeft = j.x - scrollX;
      const jRight = jLeft + j.w;
      const jTop = j.y - j.h / 2;
      const jBottom = j.y + j.h / 2;
      const rH = runner.ducking ? 24 : 35;
      const rHalfW = runner.width / 2;
      const rLeft = runner.x - rHalfW;
      const rRight = runner.x + rHalfW;
      const rTop = runner.y - rH / 2;
      const rBottom = runner.y + rH / 2;
      return rRight > jLeft && rLeft < jRight && rBottom > jTop && rTop < jBottom;
    }

    function drawJet(j) {
      const sx = j.x - scrollX;
      if (sx + j.w < -60 || sx > W + 60) return;
      ctx.save();
      ctx.translate(sx + j.w / 2, j.y);
      const rw = j.w / 2;
      const rh = j.h / 2;
      ctx.fillStyle = '#8a9aab';
      ctx.beginPath();
      ctx.ellipse(0, 0, rw, rh * 0.6, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#5a6a7a';
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.fillStyle = '#b0c0d0';
      ctx.beginPath();
      ctx.ellipse(0, -rh * 0.25, rw * 0.7, rh * 0.5, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#7a8a9a';
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.restore();
    }

    function drawSky() {
      const g = ctx.createLinearGradient(0, 0, 0, H);
      g.addColorStop(0, '#5eb3e8');
      g.addColorStop(0.6, '#87ceeb');
      g.addColorStop(1, '#b8e0f0');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, W, H);
    }

    function drawSun() {
      ctx.fillStyle = '#ffdb4d';
      ctx.beginPath();
      ctx.arc(W - 100, 70, 40, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,200,100,0.5)';
      ctx.lineWidth = 4;
      ctx.stroke();
    }

    function drawMountains() {
      ctx.fillStyle = '#7cb87c';
      ctx.beginPath();
      ctx.moveTo(0, H);
      ctx.lineTo(0, H - 120);
      ctx.lineTo(120, groundY + 20);
      ctx.lineTo(280, H - 80);
      ctx.lineTo(450, groundY + 10);
      ctx.lineTo(600, H - 100);
      ctx.lineTo(800, groundY + 30);
      ctx.lineTo(W + 50, H - 60);
      ctx.lineTo(W + 50, H);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = '#5a9a5a';
      ctx.beginPath();
      ctx.moveTo(0, H);
      ctx.lineTo(180, H - 90);
      ctx.lineTo(350, groundY);
      ctx.lineTo(520, H - 70);
      ctx.lineTo(750, groundY + 20);
      ctx.lineTo(W + 50, H);
      ctx.closePath();
      ctx.fill();
    }

    function drawOcean() {
      const g = ctx.createLinearGradient(0, groundY, 0, H);
      g.addColorStop(0, '#1e90ff');
      g.addColorStop(0.5, '#1874cd');
      g.addColorStop(1, '#0d3d4d');
      ctx.fillStyle = g;
      ctx.fillRect(0, groundY + 5, W, oceanHeight);

      // waves
      ctx.strokeStyle = 'rgba(255,255,255,0.35)';
      ctx.lineWidth = 2;
      for (let i = 0; i < 8; i++) {
        ctx.beginPath();
        const baseY = groundY + 15 + Math.sin(time * 0.1 + i) * 5;
        for (let x = -20; x < W + 20; x += 15) {
          const y = baseY + Math.sin((x + scrollX * 0.3) * 0.08) * 6;
          if (x === -20) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.stroke();
      }
    }

    function drawSand() {
      const g = ctx.createLinearGradient(0, groundY - 30, 0, H);
      g.addColorStop(0, '#e8c97a');
      g.addColorStop(0.4, '#d4a84b');
      g.addColorStop(1, '#c4942e');
      ctx.fillStyle = g;
      ctx.fillRect(0, groundY, W, H - groundY);
    }

    function drawPalm(x, scale) {
      const baseY = groundY + 5;
      ctx.save();
      ctx.translate(x, baseY);

      // trunk
      ctx.fillStyle = '#8b6914';
      ctx.fillRect(-6 * scale, 0, 12 * scale, -55 * scale);

      // leaves
      ctx.fillStyle = '#228b22';
      for (let i = 0; i < 6; i++) {
        const a = (i / 6) * Math.PI * 0.8 - 0.2;
        ctx.save();
        ctx.rotate(a);
        ctx.beginPath();
        ctx.ellipse(0, -50 * scale, 25 * scale, 8 * scale, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
      ctx.restore();
    }

    function drawObstacle(ob) {
      const x = ob.x - scrollX;
      if (x + ob.w < -20 || x > W + 20) return;
      const y = groundY + ob.yOffset;

      switch (ob.type) {
        case 'rock':
          ctx.fillStyle = '#4a4a4a';
          ctx.beginPath();
          ctx.ellipse(x + ob.w / 2, y - ob.h / 2, ob.w / 2, ob.h / 2, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = '#2a2a2a';
          ctx.lineWidth = 1;
          ctx.stroke();
          break;
        case 'coconut':
          ctx.fillStyle = '#3d2817';
          ctx.beginPath();
          ctx.arc(x + ob.w / 2, y - ob.h / 2, ob.w / 2 - 2, 0, Math.PI * 2);
          ctx.fill();
          break;
        case 'water':
          ctx.fillStyle = 'rgba(30, 144, 255, 0.6)';
          ctx.strokeStyle = 'rgba(30, 144, 255, 0.9)';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.roundRect(x, y - ob.h, ob.w, ob.h, 4);
          ctx.fill();
          ctx.stroke();
          break;
        case 'tiki':
          ctx.fillStyle = '#8b4513';
          ctx.fillRect(x + 2, y - ob.h, 14, ob.h);
          ctx.fillStyle = '#654321';
          ctx.beginPath();
          ctx.arc(x + 9, y - ob.h - 12, 10, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = '#fff';
          ctx.font = 'bold 10px sans-serif';
          ctx.fillText('😠', x + 5, y - ob.h - 8);
          break;
        case 'chips':
          // bright snack bag
          ctx.save();
          ctx.translate(x + ob.w / 2, y - ob.h / 2);
          ctx.rotate(Math.sin(time * 0.15 + x * 0.02) * 0.15);
          ctx.fillStyle = '#ffcc33';
          ctx.beginPath();
          ctx.moveTo(-ob.w / 2, ob.h / 2);
          ctx.lineTo(-ob.w / 2 + 4, -ob.h / 2);
          ctx.lineTo(ob.w / 2 - 4, -ob.h / 2);
          ctx.lineTo(ob.w / 2, ob.h / 2);
          ctx.closePath();
          ctx.fill();
          ctx.fillStyle = '#e67e22';
          ctx.fillRect(-ob.w / 2 + 3, -2, ob.w - 6, 4);
          ctx.fillStyle = '#fff';
          ctx.font = 'bold 9px sans-serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText('CH', 0, -6);
          ctx.restore();
          break;
        case 'flower':
          ctx.fillStyle = '#ff69b4';
          ctx.beginPath();
          for (let i = 0; i < 5; i++) {
            const a = (i / 5) * Math.PI * 2 + time * 0.05;
            const px = x + ob.w / 2 + Math.cos(a) * 12;
            const py = y - ob.h / 2 + Math.sin(a) * 8;
            if (i === 0) ctx.moveTo(px, py);
            else ctx.lineTo(px, py);
          }
          ctx.closePath();
          ctx.fill();
          ctx.fillStyle = '#ffd700';
          ctx.beginPath();
          ctx.arc(x + ob.w / 2, y - ob.h / 2, 4, 0, Math.PI * 2);
          ctx.fill();
          break;
      }
    }

    function drawRunner() {
      const x = runner.x;
      let y = runner.y;
      const phase = runner.legPhase;
      const ducking = runner.ducking;
      const bodyH = ducking ? 14 : 22;
      const bodyW = 12;

      // on ground: subtle up-down bobbing
      const bobbing = runner.onGround && !ducking ? Math.sin(phase) * 2.5 : 0;

      ctx.save();
      ctx.translate(x, y + bobbing);

      // yellow cape in the air; on left when moving right, on right when moving left
      if (!runner.onGround) {
        const glidingHorizontally =
          ((keys.ArrowLeft && !keys.ArrowRight) || (keys.ArrowRight && !keys.ArrowLeft)) &&
          !keys.ArrowDown;
        const flutterSpeed = glidingHorizontally ? 1.6 : 0.35;
        const flutterAmp = glidingHorizontally ? 4 : 6;
        const flutter = Math.sin(time * flutterSpeed) * flutterAmp;
        const movingLeft = keys.ArrowLeft && !keys.ArrowRight;

        ctx.fillStyle = '#ffd84a';
        ctx.beginPath();
        if (movingLeft) {
          // cape on right side when moving left
          ctx.moveTo(bodyW / 2, -bodyH / 2 - (glidingHorizontally ? 2 : 0));
          ctx.quadraticCurveTo(
            bodyW / 2 + 20,
            -bodyH / 2 + 10 + flutter,
            bodyW / 2 + 28,
            bodyH / 2 + 14
          );
          ctx.lineTo(bodyW / 2, bodyH / 2);
        } else {
          // cape on left side when moving right or neutral
          ctx.moveTo(-bodyW / 2, -bodyH / 2 - (glidingHorizontally ? 2 : 0));
          ctx.quadraticCurveTo(
            -bodyW / 2 - 20,
            -bodyH / 2 + 10 + flutter,
            -bodyW / 2 - 28,
            bodyH / 2 + 14
          );
          ctx.lineTo(-bodyW / 2, bodyH / 2);
        }
        ctx.closePath();
        ctx.fill();
      }

      if (ducking) {
        // crouched: low body, bent legs to the side (filled legs)
        ctx.fillStyle = '#e74c3c';
        ctx.fillRect(-bodyW / 2, -bodyH / 2, bodyW, bodyH);
        ctx.fillStyle = '#f5d7b2';
        ctx.beginPath();
        ctx.arc(0, -bodyH / 2 - 6, 6, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#2c5282';
        ctx.fillRect(-12, bodyH / 2 + 2, 10, 5);
        ctx.fillRect(2, bodyH / 2 + 2, 10, 5);
        ctx.strokeStyle = '#1a365d';
        ctx.lineWidth = 1;
        ctx.strokeRect(-12, bodyH / 2 + 2, 10, 5);
        ctx.strokeRect(2, bodyH / 2 + 2, 10, 5);
      } else if (runner.onGround) {
        // running on ground: visible legs (thigh + calf), then body, then arms
        const legSwing = Math.sin(phase) * 0.5;
        const lKneeX = -3 + 10 * Math.sin(legSwing);
        const lKneeY = bodyH / 2 + 10 * Math.cos(legSwing);
        const rKneeX = 3 - 10 * Math.sin(legSwing);
        const rKneeY = bodyH / 2 + 10 * Math.cos(-legSwing);
        ctx.fillStyle = '#2c5282';
        ctx.strokeStyle = '#1a365d';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(-4, bodyH / 2);
        ctx.lineTo(lKneeX - 2, lKneeY);
        ctx.lineTo(lKneeX - 1, lKneeY + 14);
        ctx.lineTo(-2, bodyH / 2 + 16);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(4, bodyH / 2);
        ctx.lineTo(rKneeX + 2, rKneeY);
        ctx.lineTo(rKneeX + 1, rKneeY + 14);
        ctx.lineTo(2, bodyH / 2 + 16);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = '#e74c3c';
        ctx.fillRect(-bodyW / 2, -bodyH / 2, bodyW, bodyH);

        ctx.fillStyle = '#f5d7b2';
        ctx.beginPath();
        ctx.arc(0, -bodyH / 2 - 8, 7, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = '#333';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(-bodyW / 2, -bodyH / 4);
        ctx.lineTo(-bodyW / 2 - 8 * Math.sin(-phase * 1.2), -bodyH / 4 - 10);
        ctx.moveTo(bodyW / 2, -bodyH / 4);
        ctx.lineTo(bodyW / 2 + 8 * Math.sin(-phase * 1.2), -bodyH / 4 - 10);
        ctx.stroke();
      } else {
        // in the air: Superman pose with legs trailing (simple filled legs)
        ctx.rotate(0.38);
        ctx.fillStyle = '#e74c3c';
        ctx.fillRect(-bodyW / 2, -bodyH / 2, bodyW, bodyH);
        ctx.fillStyle = '#f5d7b2';
        ctx.beginPath();
        ctx.arc(0, -bodyH / 2 - 8, 7, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#333';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(-bodyW / 2, -bodyH / 4);
        ctx.lineTo(-bodyW / 2 - 18, -bodyH / 4 - 4);
        ctx.moveTo(bodyW / 2, -bodyH / 4);
        ctx.lineTo(bodyW / 2 + 18, -bodyH / 4 - 4);
        ctx.stroke();
        ctx.fillStyle = '#2c5282';
        ctx.fillRect(-5, bodyH / 2 - 2, 4, 14);
        ctx.fillRect(1, bodyH / 2 - 2, 4, 14);
      }

      ctx.restore();
    }

    function hitTestRunnerObstacle(ob) {
      const obLeft = ob.x - scrollX;
      const obRight = obLeft + ob.w;
      const obTop = groundY + ob.yOffset - ob.h;
      const obBottom = groundY + ob.yOffset;

      const rH = runner.ducking ? 24 : 35;
      const rHalfW = runner.width / 2;
      const rLeft = runner.x - rHalfW;
      const rRight = runner.x + rHalfW;
      const rTop = runner.y - rH / 2;
      const rBottom = runner.y + rH / 2;

      return rRight > obLeft && rLeft < obRight && rBottom > obTop && rTop < obBottom;
    }

    function resetGame() {
      gameOver = false;
      scrollX = 0;
      obstacles = [];
      meteors = [];
      blasts = [];
      jets = [];
      time = 0;
      nextObstacleAt = 220;
      nextMeteorAt = 350;
      nextJetAt = 380;
      score = 0;
      runner.x = 80;
      runner.y = groundY - 35;
      runner.vy = 0;
      runner.onGround = true;
      runner.ducking = false;
      runner.legPhase = 0;
    }

    function update(dt) {
      if (gameOver) {
        return;
      }

      time += dt;
      scrollX += scrollSpeed;

      // spawn obstacles
      if (scrollX >= nextObstacleAt) {
        spawnObstacle();
        nextObstacleAt = scrollX + 180 + Math.random() * 120;
      }

      // spawn meteors (top half of screen only, right to left, multiple levels)
      if (scrollX >= nextMeteorAt) {
        spawnMeteor();
        spawnMeteor();
        spawnMeteor();
        nextMeteorAt = scrollX + 35 + Math.random() * 165;
      }
      meteors.forEach(m => { m.x -= m.speed * dt; });

      // meteor vs runner: contact = blast, +5 points, meteor removed
      meteors = meteors.filter(m => {
        if (hitTestRunnerMeteor(m)) {
          playBlastSound();
          blasts.push({ x: m.x, y: m.y, t0: time });
          score += 5;
          return false;
        }
        return true;
      });
      meteors = meteors.filter(m => m.x - scrollX + m.tailLen + m.r > -40);
      blasts = blasts.filter(b => time - b.t0 < (b.big ? 0.7 : 0.5));

      // spawn jets (top half), move, hit = big fireball +5
      if (scrollX >= nextJetAt) {
        spawnJet();
        nextJetAt = scrollX + 160 + Math.random() * 120;
      }
      jets.forEach(j => {
        j.x -= jetSpeed * dt;
        j.y = j.y0 + Math.sin(time * 1.3 + j.phase) * 10;
      });
      jets = jets.filter(j => {
        if (hitTestRunnerJet(j)) {
          playBlastSound();
          blasts.push({ x: j.x + j.w / 2, y: j.y, t0: time, big: true });
          score += 5;
          return false;
        }
        return true;
      });
      jets = jets.filter(j => j.x - scrollX + j.w > -50);

      // arrow keys: left / right move, up = jump, down = duck
      const baseMoveSpeed = runner.runSpeed * (dt / 16);
      const airMultiplier = runner.onGround ? 1 : 10; // much more horizontal movement in the air
      const moveSpeed = baseMoveSpeed * airMultiplier;
      if (keys.ArrowLeft)  runner.x = Math.max(50, runner.x - moveSpeed);
      if (keys.ArrowRight) runner.x = Math.min(W - 50, runner.x + moveSpeed);
      runner.ducking = keys.ArrowDown;

      if (keys.ArrowUp && runner.onGround) {
        runner.vy = runner.jumpPower;
        runner.onGround = false;
      }

      // runner physics: half fall speed when moving horizontally in the air
      const glidingHorizontally =
        !runner.onGround &&
        ((keys.ArrowLeft && !keys.ArrowRight) || (keys.ArrowRight && !keys.ArrowLeft));
      const gravity = glidingHorizontally ? 0.15 : 0.6;
      runner.vy += gravity;
      runner.y += runner.vy;

      const standHeight = runner.ducking ? 24 : runner.height;
      // ceiling: don't fly off the top of the screen
      if (runner.y < ceilingMargin) {
        runner.y = ceilingMargin;
        runner.vy = 0;
      }
      if (runner.y >= groundY - standHeight) {
        runner.y = groundY - standHeight;
        runner.vy = 0;
        runner.onGround = true;
      } else {
        runner.onGround = false;
      }
      runner.legPhase += 0.25;

      // death: hit lethal obstacles
      obstacles.forEach(ob => {
        if (lethalObstacles.includes(ob.type) && hitTestRunnerObstacle(ob)) {
          gameOver = true;
          if (score > highScore) {
            highScore = score;
            try {
              localStorage.setItem('hawaiiRunnerHighScore', String(highScore));
            } catch (e) {
              // ignore storage errors
            }
          }
        }
        const obScreenX = ob.x - scrollX;
        if (obScreenX + ob.w < runner.x - 10) {
          if (!ob.passed) {
            ob.passed = true;
          }
          if (ob.passed && !ob.counted && lethalObstacles.includes(ob.type)) {
            ob.counted = true;
            score += 1;
          }
        }
      });

      // remove old obstacles
      obstacles = obstacles.filter(ob => ob.x - scrollX + ob.w > -30);
    }

    function draw() {
      drawSky();
      drawSun();
      drawMountains();

      // palms in background (parallax)
      const palmPositions = [100, 350, 600, 850, 1100, 1400];
      palmPositions.forEach(px => {
        const screenX = (px - scrollX * 0.3) % (W + 80) - 40;
        if (screenX > -60) drawPalm(screenX, 0.7);
      });

      drawSand();
      drawOcean();

      // palms in foreground
      [250, 500, 750, 1000].forEach(px => {
        const screenX = (px - scrollX * 0.6) % (W + 100) - 50;
        if (screenX > -80) drawPalm(screenX, 1);
      });

      obstacles.forEach(drawObstacle);
      meteors.forEach(drawMeteor);
      jets.forEach(drawJet);
      drawRunner();
      blasts.forEach(drawBlast);

      // HUD: score and high score
      ctx.fillStyle = 'rgba(0,0,0,0.4)';
      ctx.fillRect(10, 10, 240, 54);
      ctx.fillStyle = '#fff';
      ctx.font = '20px sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText(`Score: ${score}`, 20, 34);
      ctx.font = '13px sans-serif';
      ctx.fillText(`Best: ${highScore}`, 20, 52);

      if (gameOver) {
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 40px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('You wiped out!', W / 2, H / 2 - 35);
        ctx.font = '28px sans-serif';
        ctx.fillText(`Score: ${score}`, W / 2, H / 2 + 5);
        ctx.font = '18px sans-serif';
        ctx.fillText('Press SPACE to run again.', W / 2, H / 2 + 40);
        ctx.textAlign = 'left';
      }
    }

    let last = performance.now();
    function loop(now) {
      const dt = Math.min((now - last) / 1000 * 60, 4);
      last = now;
      update(dt);
      draw();
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  </script>
</body>
